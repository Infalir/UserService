version: "3.9"

services:

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: order-service:latest
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: order-postgres
      DB_PORT: 5432
      DB_NAME: orderservice
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8080}
      SERVER_PORT: 8082
    depends_on:
      order-postgres:
        condition: service_healthy
    networks:
      - order-service-net
    restart: unless-stopped

  order-postgres:
    image: postgres:16-alpine
    container_name: order-service-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: orderservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-service-net

volumes:
  order_postgres_data:

networks:
  order-service-net:
    driver: bridge
