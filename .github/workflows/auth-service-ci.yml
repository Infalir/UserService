name: Auth Service CI

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/auth-service
  JAVA_VERSION: '21'

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: authservice_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: auth-service
        run: mvn clean compile -B

      - name: Run Unit Tests
        working-directory: auth-service
        run: mvn test -B -Dtest="**/*Test" -DfailIfNoTests=false
        env:
          JWT_SECRET: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-algorithm
          JWT_ACCESS_EXPIRATION_MS: 900000
          JWT_REFRESH_EXPIRATION_MS: 604800000

      - name: Run Integration Tests
        working-directory: auth-service
        run: mvn test -B -Dtest="**/*IntegrationTest" -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: local
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/authservice_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-algorithm
          JWT_ACCESS_EXPIRATION_MS: 900000
          JWT_REFRESH_EXPIRATION_MS: 604800000

      - name: Generate JaCoCo Coverage Report
        working-directory: auth-service
        run: mvn jacoco:report -B

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-test-results
          path: auth-service/target/surefire-reports/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: auth-coverage-report
          path: auth-service/target/site/jacoco/

  # ─── Job 2: Code Analysis (SonarCloud) ──────────────────────────────────────
  code-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Validate Sonar secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "ERROR: SONAR_TOKEN secret is not set"; exit 1
          fi
          if [ -z "${{ secrets.SONAR_ORGANIZATION }}" ]; then
            echo "ERROR: SONAR_ORGANIZATION secret is not set"; exit 1
          fi
          if [ -z "${{ secrets.SONAR_AUTH_PROJECT_KEY }}" ]; then
            echo "ERROR: SONAR_AUTH_PROJECT_KEY secret is not set"; exit 1
          fi
          echo "All Sonar secrets present"

      - name: Build and analyze with SonarCloud
        working-directory: auth-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_AUTH_PROJECT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-algorithm
          JWT_ACCESS_EXPIRATION_MS: 900000
          JWT_REFRESH_EXPIRATION_MS: 604800000
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -DskipTests \
            -B

  # ─── Job 3: Build & Push Docker Image ───────────────────────────────────────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: auth-service
        run: mvn package -DskipTests -B
        env:
          JWT_SECRET: build-time-placeholder-not-used-at-runtime
          JWT_ACCESS_EXPIRATION_MS: 900000
          JWT_REFRESH_EXPIRATION_MS: 604800000

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max